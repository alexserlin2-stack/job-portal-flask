<!DOCTYPE html>
<html>
<head>
    <title>Job Portal</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            text-align: center;
        }
        .box {
            background: white;
            padding: 20px;
            margin: 100px auto;
            width: 300px;
            border-radius: 10px;
        }
        input, button {
            padding: 10px;
            margin: 10px;
            width: 80%;
        }
        button {
            background: blue;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Post a Job</h2>

    <form action="/post" method="post">
        <input type="text" name="title" placeholder="Enter Job Title" required>
        <br>
        <button type="submit">Post Job</button>
    </form>

    <br>
    <a href="/jobs">View Jobs</a>
</div>

</body>
</html>
